# Rust check, lint, and format tasks

["rust:check"]
description = "Check all Rust crates for errors"
run = "cargo check --workspace --exclude openshell-vm"
hide = true

["rust:lint"]
description = "Lint Rust code with Clippy"
run = "cargo clippy --workspace --all-targets --exclude openshell-vm"
hide = true

["rust:format"]
description = "Format Rust code"
run = "cargo fmt --all"
hide = true

["rust:format:check"]
description = "Check Rust formatting"
run = "cargo fmt --all -- --check"
hide = true

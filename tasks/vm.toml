# openshell-vm development helpers

[vm]
description = "Build and run the standalone openshell-vm microVM"
run = [
  "mise run vm:build:binary",
  "tasks/scripts/codesign-openshell-vm.sh",
  "tasks/scripts/bundle-vm-runtime.sh",
  "tasks/scripts/ensure-vm-rootfs.sh",
  "tasks/scripts/sync-vm-rootfs.sh",
  "tasks/scripts/run-vm.sh",
]
hide = false

["vm:build"]
description = "Force a fresh openshell-vm rebuild, including the rootfs"
run = [
  "mise run vm:build:binary",
  "tasks/scripts/codesign-openshell-vm.sh",
  "tasks/scripts/bundle-vm-runtime.sh",
  "OPENSHELL_VM_FORCE_ROOTFS_REBUILD=1 tasks/scripts/ensure-vm-rootfs.sh",
  "tasks/scripts/sync-vm-rootfs.sh",
]
hide = false

["vm:build:binary"]
description = "Build the standalone openshell-vm binary"
run = "cargo build -p openshell-vm"
hide = true

["vm:build:release"]
description = "Build the standalone openshell-vm binary in release mode"
run = "cargo build -p openshell-vm --release"
hide = true

["vm:rootfs"]
description = "Build the default openshell-vm rootfs if needed"
run = "tasks/scripts/ensure-vm-rootfs.sh"
hide = true

["vm:codesign"]
description = "Codesign the openshell-vm binary for Hypervisor.framework access on macOS"
depends = ["vm:build:binary"]
run = "tasks/scripts/codesign-openshell-vm.sh"
hide = true

["vm:bundle-runtime"]
description = "Stage the openshell-vm sidecar runtime bundle next to local build outputs"
run = "tasks/scripts/bundle-vm-runtime.sh"
hide = false

["vm:build-custom-runtime"]
description = "Build a custom libkrunfw with bridge/netfilter kernel support"
run = "crates/openshell-vm/runtime/build-custom-libkrunfw.sh"
hide = false

["vm:check-capabilities"]
description = "Check VM kernel capabilities (run inside the VM)"
run = "echo 'This script must be run inside the VM. Copy it to the rootfs or exec into a running VM.'"
hide = false

["vm:package:openshell-vm"]
description = "Package the openshell-vm binary with its sidecar runtime bundle"
run = "tasks/scripts/package-openshell-vm-runtime.sh"
depends = ["vm:build:release", "vm:bundle-runtime"]
hide = false

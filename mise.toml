# Navigator mise configuration
# See https://mise.jdx.dev/ for documentation

redactions = ["*_TOKEN", "*_PASSWORD"]

[settings]
experimental = true

[tools]
python = "3.12"
rust = "stable"
kubectl = "latest"
uv = "latest"
protoc = "29"
helm = "latest"
sccache = "latest"
"cargo:cargo-edit" = "latest"

[env]
_.path = ["{{config_root}}/scripts/bin"]
_.python.venv = { path = ".venv", create = true }
_.file = [".env"]

KUBECONFIG = "{{config_root}}/kubeconfig"
UV_CACHE_DIR = "{{config_root}}/.cache/uv"

# Enable sccache for faster Rust builds
RUSTC_WRAPPER = "sccache"
SCCACHE_DIR = "{{config_root}}/.cache/sccache"

# Artifact registries
NAV_PYPI_REPOSITORY_URL = "https://urm.nvidia.com/artifactory/api/pypi/nv-shared-pypi-local"
NAV_DOCKER_REGISTRY = "artifactory.nvidia.com"
NAV_DOCKER_NAMESPACE = "sw-navigator-docker-local"

[vars]
# Python paths to include in formatting/linting
python_paths = "python/ scripts/*.py"

# ============================================================================
# Build Tasks
# ============================================================================

[tasks.build]
description = "Build all Rust crates"
run = "cargo build --workspace"

[tasks."build:release"]
description = "Build all Rust crates in release mode"
run = "cargo build --workspace --release"

[tasks.check]
description = "Check all Rust crates for errors"
run = "cargo check --workspace"

[tasks.clippy]
description = "Run Clippy lints"
run = "cargo clippy --workspace --all-targets"

[tasks.fmt]
description = "Format Rust code"
run = "cargo fmt --all"

[tasks."fmt:check"]
description = "Check Rust formatting"
run = "cargo fmt --all -- --check"

# ============================================================================
# Test Tasks
# ============================================================================

[tasks.test]
description = "Run all tests (Rust + Python)"
depends = ["test:rust", "test:python"]

[tasks."test:rust"]
description = "Run Rust tests"
run = "cargo test --workspace"

[tasks."test:python"]
description = "Run Python tests"
env = { UV_NO_SYNC = "1" }
run = "uv run pytest python/"

# ============================================================================
# Python Tasks
# ============================================================================

[tasks."python:dev"]
description = "Install Python package in development mode (builds CLI binary)"
run = "uv sync --group dev && uv pip install ."

[tasks."python:build"]
description = "Build Python wheel with CLI binary (native)"
run = "uv run maturin build --release"

[tasks."python:build:linux-x86"]
description = "Build Python wheel for Linux x86_64"
run = """
docker run --rm --platform linux/amd64 -v $(pwd):/io -w /io \
  ghcr.io/pyo3/maturin build --release
"""

[tasks."python:build:linux-arm"]
description = "Build Python wheel for Linux aarch64"
run = """
docker run --rm --platform linux/arm64 -v $(pwd):/io -w /io \
  ghcr.io/pyo3/maturin build --release
"""

[tasks."python:build:all"]
description = "Build Python wheels for all platforms"
depends = ["python:build", "python:build:linux-x86", "python:build:linux-arm"]

[tasks."python:lint"]
description = "Lint Python code with ruff"
env = { UV_NO_SYNC = "1" }
run = "uv run ruff check {{vars.python_paths}}"

[tasks."python:fmt"]
description = "Format Python code with ruff"
run = "uv run ruff format {{vars.python_paths}}"

[tasks."python:typecheck"]
description = "Type check Python code with ty"
run = "uv run ty check {{vars.python_paths}}"

# ============================================================================
# Sandbox Tasks
# ============================================================================

[tasks.sandbox]
description = "Run the sandbox container with an interactive shell"
depends = ["docker:build:sandbox"]
run = """
TTY_FLAG=""
if [ -t 0 ]; then
  TTY_FLAG="-it"
fi
CMD=("$@")
if [ "$#" -eq 0 ]; then
  CMD=("/bin/bash")
fi
docker run ${TTY_FLAG} \
  --cap-add=SYS_ADMIN \
  --cap-add=NET_ADMIN \
  -v ${PWD}/dev-sandbox-policy.yaml:/var/navigator/policy.yaml:ro \
  -v ${PWD}/tmp:/sandbox/tmp \
  -e HOME=/sandbox \
  -w /sandbox \
  -e NAVIGATOR_SANDBOX_POLICY=/var/navigator/policy.yaml \
  navigator-sandbox:${IMAGE_TAG:-dev} -i "${CMD[@]}"
"""

# ============================================================================
# Helm Tasks
# ============================================================================

[tasks."helm:lint"]
description = "Lint the navigator helm chart"
run = "helm lint deploy/helm/navigator"

# ============================================================================
# Docker Build Tasks
# ============================================================================

[tasks."docker:build"]
description = "Build all Docker images"
depends = [
  "docker:build:sandbox",
  "docker:build:server",
  "docker:build:cluster",
]

[tasks."docker:build:ci"]
description = "Build the CI Docker image"
env = { DOCKER_BUILDKIT = "1" }
run = """
docker buildx build \
  -f deploy/docker/Dockerfile.ci \
  -t navigator-ci:${IMAGE_TAG:-dev} \
  --load \
  .
"""

[tasks."docker:build:sandbox"]
description = "Build the sandbox Docker image"
env = { DOCKER_BUILDKIT = "1" }
run = """
docker buildx build \
  -f deploy/docker/Dockerfile.sandbox \
  -t navigator-sandbox:${IMAGE_TAG:-dev} \
  --build-arg RUST_BUILD_PROFILE=${RUST_BUILD_PROFILE:-debug} \
  --load \
  .
"""

[tasks."docker:build:server"]
description = "Build the server Docker image"
env = { DOCKER_BUILDKIT = "1" }
run = """
docker buildx build \
  -f deploy/docker/Dockerfile.server \
  -t navigator-server:${IMAGE_TAG:-dev} \
  --load \
  .
"""

[tasks."docker:build:cluster"]
description = "Build the airgapped k3s cluster image (includes sandbox + server)"
depends = ["docker:build:sandbox", "docker:build:server"]
env = { DOCKER_BUILDKIT = "1" }
run = """
#!/usr/bin/env bash
set -euo pipefail

K3S_VERSION=${K3S_VERSION:-v1.29.8-k3s1}
IMAGE_TAG=${IMAGE_TAG:-dev}
ENVOY_GATEWAY_VERSION=${ENVOY_GATEWAY_VERSION:-v1.5.8}

# Create build directories
mkdir -p deploy/docker/.build/images
mkdir -p deploy/docker/.build/charts

# Export images as Docker tarballs for airgap deployment
echo "Exporting navigator-sandbox..."
docker save navigator-sandbox:${IMAGE_TAG} -o deploy/docker/.build/images/navigator-sandbox.tar

echo "Exporting navigator-server..."
docker save navigator-server:${IMAGE_TAG} -o deploy/docker/.build/images/navigator-server.tar

# Package navigator helm chart
echo "Packaging navigator helm chart..."
helm package deploy/helm/navigator -d deploy/docker/.build/charts/

# Download envoy-gateway helm chart for airgap deployment
# This chart includes Gateway API CRDs, so we don't need a separate CRDs chart
echo "Downloading gateway-helm chart..."
helm pull oci://docker.io/envoyproxy/gateway-helm \
  --version ${ENVOY_GATEWAY_VERSION} \
  --destination deploy/docker/.build/charts/

# Build cluster image
echo "Building cluster image..."
docker buildx build \
  -f deploy/docker/Dockerfile.cluster \
  -t navigator-cluster:${IMAGE_TAG} \
  --build-arg K3S_VERSION=${K3S_VERSION} \
  --load \
  .

echo "Done! Cluster image: navigator-cluster:${IMAGE_TAG}"
"""

# ============================================================================
# Cluster Tasks
# ============================================================================

[tasks.cluster]
description = "Build and deploy local k3s cluster with Navigator"
depends = ["docker:build:cluster"]
run = """
#!/usr/bin/env bash
set -euo pipefail

CLUSTER_NAME=${CLUSTER_NAME:-navigator}

# Deploy the cluster using the locally built image
nav cluster admin deploy --name "${CLUSTER_NAME}" --update-kube-config

echo ""
echo "Cluster '${CLUSTER_NAME}' is ready."
echo "KUBECONFIG has been updated."
"""

[tasks."cluster:deploy"]
description = "Deploy changes to existing cluster (rebuilds images and upgrades helm release)"
env = { DOCKER_BUILDKIT = "1" }
run = """
#!/usr/bin/env bash
set -euo pipefail

CLUSTER_NAME=${CLUSTER_NAME:-navigator}
CONTAINER_NAME="navigator-cluster-${CLUSTER_NAME}"
IMAGE_TAG=${IMAGE_TAG:-dev}

# Check if cluster container is running
if ! docker ps -q --filter "name=${CONTAINER_NAME}" | grep -q .; then
  echo "Error: Cluster container '${CONTAINER_NAME}' is not running."
  echo "Start the cluster first with: mise run cluster"
  exit 1
fi

echo "Building navigator-server..."
docker buildx build \
  -f deploy/docker/Dockerfile.server \
  -t navigator-server:${IMAGE_TAG} \
  --load \
  .

echo "Building navigator-sandbox..."
docker buildx build \
  -f deploy/docker/Dockerfile.sandbox \
  -t navigator-sandbox:${IMAGE_TAG} \
  --load \
  .

echo "Importing images into k3s cluster..."
docker save navigator-server:${IMAGE_TAG} | docker exec -i ${CONTAINER_NAME} ctr -n k8s.io images import -
docker save navigator-sandbox:${IMAGE_TAG} | docker exec -i ${CONTAINER_NAME} ctr -n k8s.io images import -

echo "Upgrading helm release..."
helm upgrade navigator deploy/helm/navigator \
  --namespace navigator \
  --set image.repository=navigator-server \
  --set image.tag=${IMAGE_TAG} \
  --set server.sandboxImage=navigator-sandbox:${IMAGE_TAG} \
  --wait

echo "Restarting deployment to pick up new images..."
kubectl rollout restart deployment/navigator -n navigator
kubectl rollout status deployment/navigator -n navigator

echo "Deploy complete!"
"""

# ============================================================================
# Publishing / Versioning Tasks
# ============================================================================

[tasks."version:print"]
description = "Print git-derived version"
run = "uv run python scripts/release.py get-version"

[tasks."version:set"]
description = "Set a new version for the project (by default uses git-derived version)"
run = "uv run python scripts/release.py set-version"

[tasks."version:reset"]
description = "Reset Cargo.toml and Cargo.lock to git state"
run = "uv run python scripts/release.py reset-version"

[tasks."docker:publish"]
description = "Push docker images tagged for release (plus :latest)"
env = { IMAGE_TAG = "latest" }
run = """
#!/usr/bin/env bash
set -euo pipefail
VERSION=$(uv run python scripts/release.py get-version --docker)
mise run version:set
trap "mise run version:reset" EXIT
mise run docker:build
uv run python scripts/release.py docker-tag navigator-cluster --version "$VERSION"
uv run python scripts/release.py docker-push navigator-cluster --push-latest --version "$VERSION"
"""

[tasks."python:publish"]
description = "Publish Python wheel"
run = """
#!/usr/bin/env bash
set -euo pipefail
VERSION=$(uv run python scripts/release.py get-version --python)
mise run version:set
trap "mise run version:reset" EXIT
mise run python:build:all
uv run python scripts/release.py python-publish --version "$VERSION"
"""

[tasks.publish]
description = "Release Docker (pushes :latest) + Python artifacts"
depends = ["python:publish", "docker:publish"]
run = "true"

# ============================================================================
# Development Tasks
# ============================================================================

[tasks.clean]
description = "Clean build artifacts"
run = "cargo clean"

[tasks.all]
description = "Build, lint, and test everything"
depends = ["fmt:check", "clippy", "test", "python:lint"]

# ============================================================================
# Git Hooks
# ============================================================================

[tasks."pre-commit"]
description = "Pre-commit checks (format, lint, and tests)"
depends = ["fmt:check", "clippy", "python:lint", "test:rust", "test:python"]
